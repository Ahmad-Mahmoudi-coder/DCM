project:
  type: book
  output-dir: _output

book:
  title: "Decision-Centred Modelling (DCM)"
  subtitle: "Foundations, Architecture, and Application 
             to Industrial Process Heat Decarbonisation"
  description: "A governed, modular analytical environment for long-horizon planning under deep uncertainty—demonstrated on NZ industrial process heat decarbonisation; 93/100 futures favour biomass over full electrification when regional infrastructure costs are visible."
  image: "assets/figures/diagram1-architecture-stack.png"
  author:
    - name: Seyed Ahmad Mahmoudi Lahijani
  date: "2026"
  date-format: "YYYY"
  
  repo-url: https://github.com/Ahmad-Mahmoudi-coder/DCM
  repo-actions: [edit, issue]
  site-url: "https://ahmad-mahmoudi-coder.github.io/DCM/"
  open-graph: true
  twitter-card:
    card-style: summary_large_image
    title: "Decision-Centred Modelling (DCM)"
    description: "A decision-centred analytical framework for deep uncertainty planning. Live platform with interactive proof of concept."
    image: "assets/figures/diagram1-architecture-stack.png"
  
  chapters:
    - index.qmd
    - part: "Preface — The General Landscape"
      chapters:
        - front-matter/part-intro-preface.qmd
        - front-matter/context-declaration.qmd
        - front-matter/ai-acknowledgement.qmd
        - front-matter/preamble.qmd
        - front-matter/navigation-guide.qmd

    - part: "I — The Decision Problem"
      chapters:
        - text: "Why This Framework Exists"
          href: manuscript/part-intro-framework-1.qmd
        - text: "What Decisions Require"
          href: manuscript/module-0-orientation.qmd
        - text: "Deep Uncertainty and Its Consequences"
          href: manuscript/module-1-foundations.qmd
        - text: "Philosophical Roots of DMDU"
          href: manuscript/sub-modules/sm-1-1A-philosophical-lineage.qmd
        - text: "From Von Neumann to Satisficing"
          href: manuscript/sub-modules/sm-1-4A-decision-theory.qmd
        - text: "Seven Requirements for Defensible Analysis"
          href: manuscript/sub-modules/sm-1-7A-requirements-mapping.qmd
        - text: "Mathematical Notation and Formal Definitions"
          href: manuscript/sub-modules/sm-1-2A-mathematical-foundations.qmd

    - part: "II — The Framework Design"
      chapters:
        - text: "Architecture Overview"
          href: manuscript/part-intro-framework-2.qmd
        - text: "Modular Architecture and Artefact Governance"
          href: manuscript/module-3-architecture.qmd
        - text: "Artefact Schema Specification"
          href: manuscript/sub-modules/sm-3-5A-artefact-schema.qmd
        - text: "Backbone Implementation"
          href: manuscript/sub-modules/sm-3-7A-backbone-implementation.qmd
        - text: "AI and ML Governance Layer"
          href: manuscript/sub-modules/sm-3-8A-aiml-governance.qmd
        - text: "Available Modelling Methods"
          href: manuscript/module-2-modelling.qmd
        - text: "Optimisation Roles and Selection"
          href: manuscript/sub-modules/sm-2-2A-optimisation-roles.qmd
        - text: "Surrogate Modelling and Validation"
          href: manuscript/sub-modules/sm-2-3A-surrogate-validation.qmd
        - text: "Scenario Discovery — PRIM and CART"
          href: manuscript/sub-modules/sm-2-4A-scenario-discovery.qmd
        - text: "Domain Translation to Process Heat"
          href: manuscript/module-4-domain.qmd
        - text: "System-Level Regret"
          href: manuscript/sub-modules/sm-4-4A-system-regret.qmd

    - part: "III — The New Zealand Evidence"
      chapters:
        - text: "NZ Industrial Context"
          href: manuscript/part-intro-evidence.qmd
        - text: "New Zealand Energy System Overview"
          href: manuscript/module-5-nz-context.qmd
        - text: "GXP Hosting Capacity — Mararoa-Waimea"
          href: manuscript/sub-modules/sm-5-2A-gxp-capacity.qmd
        - text: "Biomass Resource Assessment — Southland"
          href: manuscript/sub-modules/sm-5-3A-biomass-supply.qmd
        - text: "NZ Emissions Trading Scheme History"
          href: manuscript/sub-modules/sm-5-4A-ets-history.qmd
        - text: "TIMES-NZ 3.0 — Scenarios and Uncertainty"
          href: manuscript/sub-modules/sm-5-5A-times-nz-ecosystem.qmd

    - part: "IV — The Proof of Concept"
      chapters:
        - text: "Edendale PoC — Overview and Results"
          href: manuscript/module-6-poc.qmd
        - text: "Pipeline Architecture and Data Flow"
          href: manuscript/sub-modules/sm-6-2A-poc-pipeline.qmd
        - text: "Demand Profile Construction"
          href: manuscript/sub-modules/sm-6-3B-demandpack-methods.qmd
        - text: "Site-to-GXP Interface Contract"
          href: manuscript/sub-modules/sm-6-4C-site-interface-contract.qmd
        - text: "SignalsPack Specification"
          href: manuscript/sub-modules/sm-6-5D-signalspack-contract.qmd
        - text: "Regional Extension — PyPSA Module Design"
          href: manuscript/sub-modules/sm-6-6E-pypsa-module-design.qmd
        - text: "Validation and Acceptance Records"
          href: manuscript/sub-modules/sm-6-8F-validation-records.qmd

    - part: "V — Synthesis and Extension"
      chapters:
        - text: "Synthesis Overview"
          href: manuscript/part-intro-synthesis.qmd
        - text: "Eleven Propositions and Intellectual Contribution"
          href: manuscript/module-7-synthesis.qmd

    - part: "Reference"
      chapters:
        - references/glossary.qmd

bibliography: references/references.bib

format:
  html:
    theme:
      light: default
      dark: darkly
    css: assets/custom.css
    fig-width: 8
    fig-height: 5
    fig-align: center
    toc: true
    toc-depth: 3
  docx:
    fig-width: 6
    fig-height: 4
    fig-align: center
    number-sections: true

execute:
  echo: false
  warning: false
