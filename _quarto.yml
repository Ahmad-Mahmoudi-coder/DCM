project:
  type: book
  output-dir: _output

book:
  title: "Decision-Centred Modelling (DCM)"
  subtitle: "Foundations, Architecture, and Application 
             to Industrial Process Heat Decarbonisation"
  author:
    - name: Seyed Ahmad Mahmoudi Lahijani
  date: "2026"
  date-format: "YYYY"
  
  repo-url: https://github.com/Ahmad-Mahmoudi-coder/DCM
  repo-actions: [edit, issue]
  
  chapters:
    - index.qmd
    - part: "Preface — The General Landscape"
      chapters:
        - front-matter/context-declaration.qmd
        - front-matter/ai-acknowledgement.qmd
        - front-matter/preamble.qmd
        - front-matter/navigation-guide.qmd
    - part: "The Framework — Part I: Foundations"
      chapters:
        - manuscript/module-0-orientation.qmd
        - manuscript/module-1-foundations.qmd
        - manuscript/sub-modules/sm-1-1A-philosophical-lineage.qmd
        - manuscript/sub-modules/sm-1-2A-mathematical-foundations.qmd
        - manuscript/sub-modules/sm-1-4A-decision-theory.qmd
        - manuscript/sub-modules/sm-1-7A-requirements-mapping.qmd
        - manuscript/module-2-modelling.qmd
        - manuscript/sub-modules/sm-2-2A-optimisation-roles.qmd
        - manuscript/sub-modules/sm-2-3A-surrogate-validation.qmd
        - manuscript/sub-modules/sm-2-4A-scenario-discovery.qmd
    - part: "The Framework — Part II: Architecture"
      chapters:
        - manuscript/module-3-architecture.qmd
        - manuscript/sub-modules/sm-3-5A-artefact-schema.qmd
        - manuscript/sub-modules/sm-3-7A-backbone-implementation.qmd
        - manuscript/sub-modules/sm-3-8A-aiml-governance.qmd
        - manuscript/module-4-domain.qmd
        - manuscript/sub-modules/sm-4-4A-system-regret.qmd
    - part: "The Evidence — Part III: NZ Context"
      chapters:
        - manuscript/module-5-nz-context.qmd
        - manuscript/sub-modules/sm-5-2A-gxp-capacity.qmd
        - manuscript/sub-modules/sm-5-3A-biomass-supply.qmd
        - manuscript/sub-modules/sm-5-4A-ets-history.qmd
        - manuscript/sub-modules/sm-5-5A-times-nz-ecosystem.qmd
    - part: "The Evidence — Part IV: Proof of Concept"
      chapters:
        - manuscript/module-6-poc.qmd
        - manuscript/sub-modules/sm-6-2A-poc-pipeline.qmd
        - manuscript/sub-modules/sm-6-3B-demandpack-methods.qmd
        - manuscript/sub-modules/sm-6-4C-site-interface-contract.qmd
        - manuscript/sub-modules/sm-6-5D-signalspack-contract.qmd
        - manuscript/sub-modules/sm-6-6E-pypsa-module-design.qmd
        - manuscript/sub-modules/sm-6-8F-validation-records.qmd
    - part: "Synthesis — Part V: Extension and Conclusions"
      chapters:
        - manuscript/module-7-synthesis.qmd
    - part: "Reference"
      chapters:
        - references/glossary.qmd

bibliography: references/references.bib

format:
  html:
    theme: default
    css: assets/custom.css
    fig-width: 8
    fig-height: 5
    fig-align: center
    toc: true
    toc-depth: 3
  docx:
    fig-width: 6
    fig-height: 4
    fig-align: center
    number-sections: true

execute:
  echo: false
  warning: false
