<svg viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8899aa"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5dade2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" fill="white"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f3460">Decision-Centred Modelling — Analytical Architecture</text>
  <text x="360" y="46" text-anchor="middle" font-size="10" fill="#8899aa">Artefact exchange across seven analytical layers</text>

  <!-- Layer heights: y_top = 65, each layer h=52, gap=6, 7 layers -->
  <!-- Layer 7: Decision -->
  <rect x="80" y="65" width="480" height="48" rx="6" fill="#0f3460"/>
  <text x="320" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="white">7 · Decision Layer</text>
  <text x="320" y="101" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.75)">Alternatives · Futures · Pathway comparison · Regret / Satisficing / Robustness</text>

  <!-- Arrow down -->
  <line x1="320" y1="113" x2="320" y2="125" stroke="#8899aa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="580" y="122" text-anchor="start" font-size="8.5" fill="#8899aa">DecisionSummaryArtefact</text>

  <!-- Layer 6: DMDU Evaluation -->
  <rect x="80" y="127" width="480" height="48" rx="6" fill="#1a4a80"/>
  <text x="320" y="147" text-anchor="middle" font-size="12" font-weight="bold" fill="white">6 · DMDU Orchestration &amp; Evaluation Layer</text>
  <text x="320" y="163" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.75)">Ensemble evaluation · Regret diagnostics · Scenario discovery (PRIM/CART) · Satisficing</text>

  <line x1="320" y1="175" x2="320" y2="187" stroke="#8899aa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="580" y="184" text-anchor="start" font-size="8.5" fill="#8899aa">FutureArtefact · ResultArtefact</text>

  <!-- Layer 5: Policy/Macro -->
  <rect x="80" y="189" width="480" height="48" rx="6" fill="#265a96"/>
  <text x="320" y="209" text-anchor="middle" font-size="12" font-weight="bold" fill="white">5 · Policy &amp; Macroeconomic Context Layer</text>
  <text x="320" y="225" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.75)">TIMES-NZ scenarios · ETS price · Demand projections · REMix-NZ calibration</text>

  <line x1="320" y1="237" x2="320" y2="249" stroke="#8899aa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="580" y="246" text-anchor="start" font-size="8.5" fill="#8899aa">FutureArtefact (driver bounds)</text>

  <!-- Layer 4: Regional -->
  <rect x="80" y="251" width="480" height="48" rx="6" fill="#2e6aaa"/>
  <text x="320" y="271" text-anchor="middle" font-size="12" font-weight="bold" fill="white">4 · Regional Electricity &amp; Biomass Resource Module</text>
  <text x="320" y="287" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.75)">PyPSA-NZ / surrogate · Headroom · Upgrade selection · Biomass supply screening</text>

  <!-- Thin-waist marker -->
  <line x1="320" y1="299" x2="320" y2="311" stroke="#5dade2" stroke-width="2" marker-end="url(#arr-blue)"/>
  <!-- Thin waist label -->
  <rect x="100" y="306" width="140" height="18" rx="4" fill="#e8f4fb" stroke="#5dade2" stroke-width="1"/>
  <text x="170" y="318" text-anchor="middle" font-size="8.5" fill="#0f3460" font-weight="bold">◈  Thin-Waist Interface</text>
  <text x="580" y="308" text-anchor="start" font-size="8.5" fill="#5dade2">SignalsPack · IncrementalElectricityPack</text>

  <!-- Layer 3: GXP Interface -->
  <rect x="80" y="313" width="480" height="48" rx="6" fill="#3d7dbd" stroke="#5dade2" stroke-width="1.5"/>
  <text x="320" y="333" text-anchor="middle" font-size="12" font-weight="bold" fill="white">3 · GXP Interface Layer  (Thin Waist)</text>
  <text x="320" y="349" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.85)">EDN0331 GXP · Headroom · Tariff · Grid emissions · SHA256 integrity · Schema v0.1.0</text>

  <line x1="320" y1="361" x2="320" y2="373" stroke="#8899aa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="580" y="370" text-anchor="start" font-size="8.5" fill="#8899aa">DemandPack · ValidationArtefact</text>

  <!-- Layer 2: Site Dispatch -->
  <rect x="80" y="375" width="480" height="48" rx="6" fill="#4a90c4"/>
  <text x="320" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="white">2 · Site Dispatch Module</text>
  <text x="320" y="411" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.8)">Proportional / LP dispatch · Fuel &amp; electricity accounting · Emissions · Cost ledger</text>

  <line x1="320" y1="423" x2="320" y2="435" stroke="#8899aa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="580" y="432" text-anchor="start" font-size="8.5" fill="#8899aa">DemandPack (input)</text>

  <!-- Layer 1: Facility / Demand -->
  <rect x="80" y="437" width="480" height="48" rx="6" fill="#5da8d8"/>
  <text x="320" y="457" text-anchor="middle" font-size="12" font-weight="bold" fill="white">1 · Facility / Demand Construction Module</text>
  <text x="320" y="473" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.8)">Synthetic DemandPack · Epoch tagging · Seasonal decomposition · Acceptance gates</text>

  <!-- Governed backbone label on left -->
  <rect x="18" y="127" width="52" height="358" rx="5" fill="#f0f4f8" stroke="#dde6ef" stroke-width="1"/>
  <text transform="translate(44, 306) rotate(-90)" text-anchor="middle" font-size="9" fill="#0f3460" font-weight="bold">Governed Analytical Backbone</text>

  <!-- Bottom footnote -->
  <text x="360" y="503" text-anchor="middle" font-size="8.5" fill="#8899aa">All inter-layer exchange uses schema-conforming, provenance-carrying artefacts · Progressive refinement governed by regret diagnostics</text>
</svg>
