<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5dade2"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
    <marker id="a0" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0f3460"/>
    </marker>
  </defs>

  <rect width="760" height="430" fill="white"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f3460">2035 Pathway Comparison — EB vs BB under Deep Uncertainty</text>
  <text x="380" y="46" text-anchor="middle" font-size="9.5" fill="#8899aa">Edendale–Southland PoC · 100 paired futures · One-pass coupling · Proportional dispatch</text>

  <!-- DECISION NODE -->
  <rect x="300" y="60" width="160" height="52" rx="8" fill="#0f3460"/>
  <text x="380" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Edendale 2035</text>
  <text x="380" y="96" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.8)">Pathway Decision</text>
  <text x="380" y="110" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.6)">Coal phase-out by deadline</text>

  <!-- Branch lines from decision -->
  <line x1="340" y1="112" x2="200" y2="155" stroke="#5dade2" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="420" y1="112" x2="560" y2="155" stroke="#27ae60" stroke-width="2" marker-end="url(#a2)"/>
  <text x="240" y="140" text-anchor="middle" font-size="9" fill="#5dade2" font-weight="bold">EB pathway</text>
  <text x="520" y="140" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="bold">BB pathway</text>

  <!-- EB PATHWAY NODE -->
  <rect x="100" y="158" width="200" height="56" rx="7" fill="#5dade2"/>
  <text x="200" y="176" text-anchor="middle" font-size="11" font-weight="bold" fill="#0a1628">Electrified Boiler (EB)</text>
  <text x="200" y="192" text-anchor="middle" font-size="9" fill="#0a1628">Peak demand: 133 MW at GXP</text>
  <text x="200" y="206" text-anchor="middle" font-size="9" fill="#0a1628">Site cost: NZD 91.0M/year · CO₂: 0 t</text>

  <!-- BB PATHWAY NODE -->
  <rect x="460" y="158" width="200" height="56" rx="7" fill="#27ae60"/>
  <text x="560" y="176" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Biomass Boiler (BB)</text>
  <text x="560" y="192" text-anchor="middle" font-size="9" fill="white">Peak demand: 95 MW at GXP</text>
  <text x="560" y="206" text-anchor="middle" font-size="9" fill="white">Site cost: NZD 76.8M/year · CO₂: 1,610 t</text>

  <!-- GXP screening lines -->
  <line x1="200" y1="214" x2="200" y2="248" stroke="#5dade2" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="560" y1="214" x2="560" y2="248" stroke="#27ae60" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- EB GXP outcomes box -->
  <rect x="70" y="250" width="130" height="50" rx="5" fill="#fff0f0" stroke="#e74c3c" stroke-width="1"/>
  <text x="135" y="268" text-anchor="middle" font-size="9" font-weight="bold" fill="#c0392b">N+150 MW upgrade</text>
  <text x="135" y="282" text-anchor="middle" font-size="8.5" fill="#444">49 of 100 futures</text>
  <text x="135" y="294" text-anchor="middle" font-size="8" fill="#888">NZD 52M capex</text>

  <rect x="210" y="250" width="130" height="50" rx="5" fill="#fff7e6" stroke="#e67e22" stroke-width="1"/>
  <text x="275" y="268" text-anchor="middle" font-size="9" font-weight="bold" fill="#e67e22">N+97 MW upgrade</text>
  <text x="275" y="282" text-anchor="middle" font-size="8.5" fill="#444">51 of 100 futures</text>
  <text x="275" y="294" text-anchor="middle" font-size="8" fill="#888">NZD 28.5M capex</text>

  <!-- BB GXP outcomes box -->
  <rect x="460" y="250" width="200" height="50" rx="5" fill="#f0faf4" stroke="#27ae60" stroke-width="1"/>
  <text x="560" y="268" text-anchor="middle" font-size="9" font-weight="bold" fill="#27ae60">N+97 MW upgrade</text>
  <text x="560" y="282" text-anchor="middle" font-size="8.5" fill="#444">100 of 100 futures</text>
  <text x="560" y="294" text-anchor="middle" font-size="8" fill="#888">NZD 28.5M capex · No binding constraints</text>

  <!-- Lines to robustness outcomes -->
  <line x1="135" y1="300" x2="175" y2="335" stroke="#e74c3c" stroke-width="1.2" marker-end="url(#a1)"/>
  <line x1="275" y1="300" x2="235" y2="335" stroke="#e67e22" stroke-width="1.2" marker-end="url(#a1)"/>
  <line x1="560" y1="300" x2="560" y2="335" stroke="#27ae60" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- ROBUSTNESS OUTCOME — EB -->
  <rect x="70" y="338" width="270" height="68" rx="7" fill="#f4f8fc" stroke="#5dade2" stroke-width="1.5"/>
  <text x="205" y="358" text-anchor="middle" font-size="10" font-weight="bold" fill="#0f3460">EB Robustness Outcome</text>
  <text x="205" y="374" text-anchor="middle" font-size="9" fill="#444">Satisficing rate: 35% · Mean regret: NZD 8.8M/yr</text>
  <text x="205" y="389" text-anchor="middle" font-size="9" fill="#444">Max regret: NZD 18.9M/yr · N+150 exposure: 49%</text>
  <text x="205" y="400" text-anchor="middle" font-size="8.5" fill="#c0392b" font-weight="bold">System-cost winner in 7 of 100 futures</text>

  <!-- ROBUSTNESS OUTCOME — BB -->
  <rect x="420" y="338" width="270" height="68" rx="7" fill="#f0faf4" stroke="#27ae60" stroke-width="2"/>
  <text x="555" y="358" text-anchor="middle" font-size="10" font-weight="bold" fill="#0f3460">BB Robustness Outcome</text>
  <text x="555" y="374" text-anchor="middle" font-size="9" fill="#444">Satisficing rate: 88% · Mean regret: NZD 0.1M/yr</text>
  <text x="555" y="389" text-anchor="middle" font-size="9" fill="#444">Max regret: NZD 4.5M/yr · N+150 exposure: 0%</text>
  <text x="555" y="400" text-anchor="middle" font-size="8.5" fill="#27ae60" font-weight="bold">System-cost winner in 93 of 100 futures ✓</text>

  <!-- Central annotation -->
  <rect x="310" y="340" width="100" height="30" rx="5" fill="#0f3460"/>
  <text x="360" y="358" text-anchor="middle" font-size="10" font-weight="bold" fill="white">93 / 100</text>
  <text x="360" y="370" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.8)">BB preferred</text>

  <!-- Footnote -->
  <text x="380" y="418" text-anchor="middle" font-size="8" fill="#8899aa">Results from 100 paired futures · Site-decision robustness overlay · One-pass coupling · Proportional dispatch · Stylised regional screening</text>
</svg>
