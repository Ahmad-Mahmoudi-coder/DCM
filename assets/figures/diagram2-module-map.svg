<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="dep" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8899aa"/>
    </marker>
    <marker id="dep-strong" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0f3460"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#ccd6e0" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="760" height="420" fill="white"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f3460">Module Dependency Map — Decision-Centred Modelling Framework</text>
  <text x="380" y="46" text-anchor="middle" font-size="9.5" fill="#8899aa">Arrows indicate prerequisite reading direction. Modules can also be entered from the Navigate by Purpose guide.</text>

  <!-- Module positions: (cx, cy) -->
  <!-- M0: 380, 90  (top centre — start here) -->
  <!-- M1: 170, 180  M2: 380, 180  M3: 590, 180 -->
  <!-- M4: 170, 280  M5: 380, 280  M6: 590, 280 -->
  <!-- M7: 380, 370  (bottom centre — terminal) -->

  <!-- Dependency lines (behind nodes) -->
  <!-- M0 → M1 -->
  <line x1="356" y1="108" x2="194" y2="162" stroke="#cccccc" stroke-width="1.2" marker-end="url(#dep)"/>
  <!-- M0 → M2 -->
  <line x1="380" y1="108" x2="380" y2="162" stroke="#cccccc" stroke-width="1.2" marker-end="url(#dep)"/>
  <!-- M0 → M3 -->
  <line x1="404" y1="108" x2="566" y2="162" stroke="#cccccc" stroke-width="1.2" marker-end="url(#dep)"/>
  <!-- M1 → M4 -->
  <line x1="170" y1="198" x2="170" y2="262" stroke="#8899aa" stroke-width="1.5" marker-end="url(#dep)"/>
  <!-- M2 → M3 -->
  <line x1="398" y1="180" x2="572" y2="180" stroke="#8899aa" stroke-width="1.5" marker-end="url(#dep)"/>
  <!-- M3 → M5 -->
  <line x1="572" y1="198" x2="404" y2="262" stroke="#8899aa" stroke-width="1.5" marker-end="url(#dep)"/>
  <!-- M3 → M6 -->
  <line x1="590" y1="198" x2="590" y2="262" stroke="#8899aa" stroke-width="1.5" marker-end="url(#dep)"/>
  <!-- M4 → M6 -->
  <line x1="188" y1="280" x2="572" y2="280" stroke="#8899aa" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#dep)"/>
  <!-- M5 → M6 -->
  <line x1="398" y1="280" x2="572" y2="280" stroke="#8899aa" stroke-width="1.5" marker-end="url(#dep)"/>
  <!-- M6 → M7 -->
  <line x1="572" y1="298" x2="404" y2="352" stroke="#0f3460" stroke-width="2" marker-end="url(#dep-strong)"/>
  <!-- M1 → M7 (light dashed) -->
  <line x1="186" y1="296" x2="356" y2="353" stroke="#cccccc" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#dep)"/>
  <!-- M2 → M5 -->
  <line x1="380" y1="198" x2="380" y2="262" stroke="#8899aa" stroke-width="1.2" marker-end="url(#dep)"/>

  <!-- NODE FUNCTION: define a reusable pattern via explicit blocks -->

  <!-- M0: Orientation — top, accent gold -->
  <rect x="300" y="65" width="160" height="50" rx="8" fill="#0f3460" filter="url(#shadow)"/>
  <text x="380" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Module 0</text>
  <text x="380" y="100" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Orientation</text>
  <rect x="300" y="65" width="160" height="8" rx="8" fill="#f0a500"/>

  <!-- M1 -->
  <rect x="100" y="165" width="140" height="46" rx="7" fill="#1a4a80" filter="url(#shadow)"/>
  <text x="170" y="184" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">Module 1</text>
  <text x="170" y="200" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Foundations</text>

  <!-- M2 -->
  <rect x="310" y="165" width="140" height="46" rx="7" fill="#1a4a80" filter="url(#shadow)"/>
  <text x="380" y="184" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">Module 2</text>
  <text x="380" y="200" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Modelling Foundations</text>

  <!-- M3 -->
  <rect x="520" y="165" width="140" height="46" rx="7" fill="#1a4a80" filter="url(#shadow)"/>
  <text x="590" y="184" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">Module 3</text>
  <text x="590" y="200" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Architecture</text>

  <!-- M4 -->
  <rect x="100" y="262" width="140" height="46" rx="7" fill="#265a96" filter="url(#shadow)"/>
  <text x="170" y="281" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">Module 4</text>
  <text x="170" y="297" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Domain Translation</text>

  <!-- M5 -->
  <rect x="310" y="262" width="140" height="46" rx="7" fill="#265a96" filter="url(#shadow)"/>
  <text x="380" y="281" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">Module 5</text>
  <text x="380" y="297" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">NZ Context</text>

  <!-- M6 -->
  <rect x="520" y="262" width="140" height="46" rx="7" fill="#265a96" filter="url(#shadow)"/>
  <text x="590" y="281" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">Module 6</text>
  <text x="590" y="297" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Proof of Concept</text>

  <!-- M7: terminal -->
  <rect x="300" y="350" width="160" height="50" rx="8" fill="#0f3460" filter="url(#shadow)"/>
  <text x="380" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Module 7</text>
  <text x="380" y="387" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Extension &amp; Synthesis</text>
  <!-- terminal badge -->
  <rect x="300" y="392" width="160" height="8" rx="8" fill="#5dade2"/>

  <!-- Legend -->
  <line x1="30" y1="340" x2="60" y2="340" stroke="#0f3460" stroke-width="2" marker-end="url(#dep-strong)"/>
  <text x="65" y="344" font-size="8.5" fill="#444">Primary prerequisite</text>
  <line x1="30" y1="358" x2="60" y2="358" stroke="#8899aa" stroke-width="1.5" marker-end="url(#dep)"/>
  <text x="65" y="362" font-size="8.5" fill="#444">Recommended prior reading</text>
  <line x1="30" y1="376" x2="60" y2="376" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#dep)"/>
  <text x="65" y="380" font-size="8.5" fill="#444">Optional context</text>

  <text x="380" y="410" text-anchor="middle" font-size="8" fill="#8899aa">All modules include Node Declarations with explicit Assumes / Passes-to fields · Sub-modules are nested within parent modules</text>
</svg>
